name: Deploy to GitHub Pages and Cloudflare

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: "pages-${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  export-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          use-dotnet: false
          include-templates: true

      - name: Export Web
        run: |
          mkdir -p dist
          godot --headless --export-release "Web" dist/index.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-dist
          path: dist/

  deploy-pages:
    if: github.ref_name == 'main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: export-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: game-dist
          path: dist/

      - name: Setup COI Service Worker
        run: |
          # GitHub Pages needs COI Service Worker workaround
          curl -L https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.min.js -o dist/coi-serviceworker.js
          sed -i 's/<script/<script src="coi-serviceworker.js"><\/script><script/' dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-cloudflare:
    runs-on: ubuntu-latest
    needs: export-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: game-dist
          path: dist/

      - name: Set Branch Slug
        id: branch
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SLUG="pr-${{ github.event.pull_request.number }}"
          else
            SLUG=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
          fi
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Upload .wasm to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.77.0
          command: r2 object put crunchtime-export-simulator/${{ steps.branch.outputs.slug }}/index.wasm --file dist/index.wasm --content-type application/wasm --remote

      - name: Upload .pck to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.77.0
          command: r2 object put crunchtime-export-simulator/${{ steps.branch.outputs.slug }}/index.pck --file dist/index.pck --content-type application/octet-stream --remote

      - name: Remove large assets from assets (served via R2)
        run: rm dist/*.wasm dist/*.pck

      - name: Setup Headers
        run: |
          # Copy _headers to dist
          cp _headers dist/_headers

      - name: Deploy to Cloudflare Workers (Main)
        if: github.ref_name == 'main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.77.0
          command: deploy --var WASM_PREFIX:main

      - name: Deploy to Cloudflare Workers (Preview)
        if: github.ref_name != 'main'
        id: deploy_preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.77.0
          command: versions upload --preview-alias ${{ steps.branch.outputs.slug }} --var WASM_PREFIX:${{ steps.branch.outputs.slug }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview: ${{ steps.deploy_preview.outputs.deployment-url }}`
            })

  deploy-itchio:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    needs: export-web
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: game-dist
          path: dist/

      - name: Install Butler
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_USER: bogay
          ITCH_GAME: crunchtime-export-simulator
        run: |
          ./butler push dist/ ${{ env.ITCH_USER }}/${{ env.ITCH_GAME }}:web --userversion ${{ github.run_number }} --if-changed
