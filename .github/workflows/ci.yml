name: CI

on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GDQuest Formatter
        run: |
          curl -L https://github.com/GDQuest/GDScript-formatter/releases/download/0.18.2/gdscript-formatter-0.18.2-linux-x86_64.zip -o gdscript-formatter.zip
          unzip gdscript-formatter.zip
          mv gdscript-formatter-0.18.2-linux-x86_64 gdscript-formatter
          chmod +x gdscript-formatter
          sudo mv gdscript-formatter /usr/local/bin/
          rm gdscript-formatter.zip

      - name: GDScript Format Check
        run: gdscript-formatter --check $(find scripts/ tests/ -name "*.gd")

      - name: GDScript Lint
        run: gdscript-formatter lint $(find scripts/ tests/ -name "*.gd")

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6
          
      - name: Run GUT Tests
        run: godot --headless -s res://addons/gut/gut_cmdln.gd -gdir=res://tests/ -ginclude_subdirs -gexit
